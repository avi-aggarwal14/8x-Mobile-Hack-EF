<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Goose</title>
<meta name="theme-color" content="#F2A03D" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Goose" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --bg:#FBF7EF; --card:#FFFFFF; --ink:#2A2A28; --muted:#7A786F;
    --amber:#F2A03D; --amber-d:#C0721F; --coral:#E2603C; --green:#2FA86B; --disc:#FDEBCF;
    --bubble:#EFEADE; --shadow:0 8px 0 rgba(42,42,40,.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg); color:var(--ink); font-family:Nunito,system-ui,sans-serif; overflow:hidden}
  .app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative}
  h1,h2,h3,.fun{font-family:"Baloo 2",system-ui,sans-serif}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;padding:20px;overflow-y:auto;transition:opacity .25s}
  .hide{opacity:0;pointer-events:none}
  /* buttons */
  .btn{font-family:"Baloo 2";font-weight:700;font-size:19px;border:none;border-radius:18px;padding:15px 18px;
       background:var(--amber);color:#fff;box-shadow:var(--shadow);cursor:pointer;width:100%;transition:transform .06s}
  .btn:active{transform:translateY(4px);box-shadow:0 4px 0 rgba(42,42,40,.10)}
  .btn.coral{background:var(--coral)} .btn.green{background:var(--green)} .btn.ghost{background:#B9B5AA}
  /* START screen */
  .goose-hero{width:140px;margin:8px auto 2px;display:block}
  .start h1{font-size:34px;text-align:center;margin:6px 0 4px;line-height:1.05}
  .start .sub{text-align:center;color:var(--muted);font-weight:700;margin:0 0 18px}
  .field{margin-bottom:12px}
  .field label{font-family:"Baloo 2";font-weight:700;font-size:14px;color:var(--amber-d);display:block;margin:0 0 5px 4px}
  .inp{width:100%;height:52px;padding:0 16px;font-size:16px;font-family:Nunito;font-weight:700;color:var(--ink);
       background:var(--card);border:2.5px solid #ECE6D8;border-radius:16px;outline:none}
  .inp:focus{border-color:var(--amber)}
  /* CHAT screen */
  .hud{background:var(--card);border-radius:20px;padding:12px 14px;box-shadow:var(--shadow);margin-bottom:12px;flex:none}
  .hud-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .lvl{font-family:"Baloo 2";font-weight:800;font-size:16px}
  .streak{font-family:"Baloo 2";font-weight:800;font-size:16px;color:var(--coral)}
  .xpbar{height:12px;background:#ECE6D8;border-radius:8px;overflow:hidden}
  .xpfill{height:100%;width:0;background:var(--amber);border-radius:8px;transition:width .5s}
  .thread{flex:1;overflow-y:auto;padding:4px 2px 8px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;align-items:flex-end;gap:8px;max-width:88%}
  .row.me{align-self:flex-end;flex-direction:row-reverse}
  .av{width:30px;height:30px;flex:none;border-radius:50%;background:var(--disc);display:flex;align-items:center;justify-content:center}
  .bub{background:var(--bubble);color:var(--ink);padding:11px 14px;border-radius:20px;font-size:15.5px;font-weight:600;line-height:1.35;border-bottom-left-radius:6px}
  .row.me .bub{background:var(--amber);color:#fff;border-bottom-left-radius:20px;border-bottom-right-radius:6px}
  .bub.typing{opacity:.55;font-style:italic}
  .tasks{flex:none;padding-top:10px;display:flex;flex-direction:column}
  .tasks:empty{padding-top:0}
  .task{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:16px;padding:9px 10px 9px 14px;box-shadow:var(--shadow);margin-bottom:8px;overflow:hidden;
        transition:height .34s ease, opacity .26s ease, transform .34s cubic-bezier(.4,0,.2,1), margin .34s ease, padding .34s ease}
  .task:last-child{margin-bottom:0}
  .task.done{opacity:.55}
  .task.leaving{opacity:0;transform:translateX(44px) scale(.97)}
  .task .t{flex:1;font-weight:800;font-size:15px}
  .task.done .t{text-decoration:line-through}
  .mini{font-family:"Baloo 2";font-weight:700;font-size:14px;border:none;border-radius:12px;padding:9px 12px;color:#fff;cursor:pointer}
  .mini.d{background:var(--green)} .mini.g{background:#B9B5AA}
  .barbtns{flex:none;display:flex;gap:8px;padding-top:10px}
  .barbtns .btn{font-size:16px;padding:13px}
  /* chat fills the screen; the toolkit scrolls in below it */
  #s-chat{display:block;padding:0}
  .chat-hero{height:100dvh;display:flex;flex-direction:column;padding:20px}
  .chat-hero .thread{min-height:0}
  .scrollcue{flex:none;text-align:center;font-family:"Baloo 2";font-weight:700;font-size:12px;color:var(--muted);opacity:.55;padding:9px 0 0;animation:cuebob 1.8s ease-in-out infinite}
  @keyframes cuebob{0%,100%{transform:translateY(0)}50%{transform:translateY(2.5px)}}
  .tools{padding:8px 20px 30px;display:flex;flex-direction:column;gap:10px}
  .tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .tool{font-family:"Baloo 2";font-weight:700;font-size:14.5px;border:2px solid #ECE6D8;border-radius:15px;
        padding:12px 8px;background:var(--card);color:var(--ink);cursor:pointer;display:flex;align-items:center;
        justify-content:center;gap:6px;text-align:center;line-height:1.15;min-height:50px;transition:transform .06s}
  .tool:active{transform:scale(.97)}
  .tool.wide{grid-column:1 / -1}
  .toolnote{margin:0;font-size:12.5px;font-weight:700;color:var(--muted);text-align:center;line-height:1.4}
  .toolnote.calwarn{font-weight:600;font-size:11.5px;opacity:.8}
  .toolnote:empty{display:none}
  .toolhint{background:var(--card);border-radius:14px;padding:12px;font-size:13px;line-height:1.5;color:var(--ink);box-shadow:var(--shadow)}
  /* CARD screen */
  .card-wrap{flex:1;display:flex;flex-direction:column;justify-content:center}
  #card{background:var(--amber);border-radius:26px;padding:24px;color:#fff;text-align:center}
  #card .goosec{width:96px;margin:0 auto 6px;display:block}
  #card h2{font-size:26px;margin:4px 0}
  #card .big{font-family:"Baloo 2";font-weight:800;font-size:46px;line-height:1;margin:8px 0}
  #card .nagq{background:rgba(255,255,255,.18);border-radius:16px;padding:12px;font-weight:700;font-size:15px;margin:12px 0}
  #card .url{font-weight:800;font-size:14px;opacity:.9;margin-top:8px}
  .confetti{position:absolute;top:-10px;font-size:22px;animation:fall 1.1s ease-in forwards;pointer-events:none}
  @keyframes fall{to{transform:translateY(105dvh) rotate(360deg);opacity:0}}
</style>
</head>
<body>
<div class="app">

  <!-- CHAT — opens straight here; chat fills the screen, toolkit scrolls in below -->
  <section class="screen" id="s-chat">
    <div class="chat-hero">
      <div class="hud">
        <div class="hud-top">
          <span class="lvl">🪿 Lvl <span id="lvl">1</span></span>
          <span class="streak">🔥 <span id="streak">0</span> streak</span>
        </div>
        <div class="xpbar"><div class="xpfill" id="xp"></div></div>
      </div>
      <div class="thread" id="thread"></div>
      <div class="tasks" id="taskList"></div>

      <!-- chat composer: first message = your name, then each line = a task -->
      <form id="composer" autocomplete="off" style="display:flex;gap:8px;margin-top:10px">
        <input id="chatInput" placeholder="Message Goose…" autocomplete="off" style="flex:1;min-width:0;height:50px;padding:0 16px;font-size:16px;font-family:Nunito;font-weight:700;color:var(--ink);background:var(--card);border:2.5px solid #ECE6D8;border-radius:16px;outline:none" />
        <button class="btn coral" id="send" type="submit" style="width:auto;padding:0 20px">➤</button>
      </form>

      <div class="scrollcue" aria-hidden="true">⌄ calendar · share · more</div>
    </div>

    <!-- TOOLKIT — scroll down to reveal; scroll up for just the chat -->
    <div class="tools">
      <div class="tools-grid">
        <button class="tool" id="calConnect">🗓️ Calendar</button>
        <button class="tool" id="toCard">📸 Share card</button>
        <button class="tool" id="tattleLink">🚨 Tattle</button>
        <button class="tool" id="pushBtn">🔔 Notify me</button>
        <button class="tool wide" id="installBtn" style="display:none">📲 Install Goose</button>
      </div>
      <p id="calStatus" class="toolnote"></p>
      <button id="calDisconnect" style="display:none;align-self:center;background:none;border:none;font-family:'Baloo 2';font-weight:700;font-size:12.5px;color:var(--coral);text-decoration:underline;cursor:pointer;padding:2px 6px">Disconnect Google Calendar</button>
      <p class="toolnote calwarn">Google shows an “unverified app” notice — tap <b>Advanced → Continue</b>. Goose only reads your calendar. 🪿</p>
      <div id="installHint" class="toolhint" style="display:none"></div>
    </div>

    <!-- proof-or-it-didn't-happen: hidden camera/file input judged by Claude vision -->
    <input type="file" id="proofInput" accept="image/*" capture="environment" style="display:none" />
  </section>

  <!-- CARD -->
  <section class="screen hide" id="s-card">
    <div class="card-wrap">
      <div id="card">
        <svg class="goosec" viewBox="0 0 220 190" aria-hidden="true"><circle cx="110" cy="98" r="80" fill="rgba(255,255,255,.22)"/><path d="M40 96 C55 72 78 64 100 66 C120 50 138 40 152 40 Q175 40 196 52 Q180 58 166 60 C168 78 150 92 140 104 C134 120 120 140 96 148 C70 154 50 140 44 120 C42 110 40 102 40 96 Z" fill="#fff" stroke="#C0721F" stroke-width="2.5" stroke-linejoin="round"/><path d="M182 46 L201 52 L182 59 Z" fill="#C0721F"/><circle cx="158" cy="50" r="3.6" fill="#2A2A28"/></svg>
        <h2 id="cardName">I survived Goose today</h2>
        <div class="big"><span id="cardDone">0</span>/<span id="cardTotal">3</span> done</div>
        <div class="nagq" id="cardNag">"Bold of you to ignore a goose."</div>
        <div class="url">goose-lockin.vercel.app</div>
      </div>
      <div style="height:14px"></div>
      <button class="btn green" id="share">Share my Goose card</button>
      <div style="height:8px"></div>
      <button class="btn ghost" id="back">← back to Goose</button>
    </div>
  </section>

</div>

<script>
const NAG = {
  intro: [
    "Oh, NOW you want accountability. Fine. Let's see what you 'forgot' today.",
    "Three tasks. I've heard promises before. The honking starts now. 🪿",
    "You summoned a goose for help. Tragic. Let's go."
  ],
  l1: ["{t} — it won't do itself. I'm watching. 🪿","Gentle nudge about {t}. Emphasis on 'gentle'. For now."],
  l2: ["Still no {t}? You unlocked your phone 14 times but not for THIS?","{t} is collecting dust. So is your potential. HONK."],
  l3: ["{t} STILL isn't done. I'm embarrassed for both of us.","Imagine telling a goose you'd do {t} and then just... not. Bold."],
  l4: ["I told the other geese about {t}. They're disappointed too. 🪿🪿🪿","{t}. NOW. I will follow you into your dreams. Not joking."],
  done: ["...you actually did it. Shocked. Proud. Tell no one I said that.","{t} DONE. The streak lives. We honk in victory. 🪿","Look at you. A functioning adult. Briefly."],
  ghost:["Ghosting {t}? Cute. Your streak just felt that.","Marked ghosted. The shame is logged. Forever.","{t} abandoned. I'm adding it to The List."],
  skip: ["Time's moving. Your tasks aren't. Pick one.","I waited. You scrolled. Classic. Do something."],
  allDone:["ALL of them?? Who ARE you. I'm almost out of insults. Almost.","Clean sweep. The geese are honking your name. 🪿🔥"],
  offtask:["Oh, you're BACK. I watched you wander off. The task did NOT move. 🪿","Sneaking away mid-task? I SAW that. Eyes back on it.","You left. The work stayed. I took notes. Explain yourself."]
};
const pick = a => a[Math.floor(Math.random()*a.length)];
const $ = id => document.getElementById(id);
let tasks=[], xp=0, streak=0, nagLevel={}, name="";

function show(id){['s-chat','s-card'].forEach(s=>$(s).classList.toggle('hide',s!==id));}
function addBub(text, me, replay){
  const row=document.createElement('div'); row.className='row'+(me?' me':'');
  row.innerHTML = (me?'':'<div class="av">🪿</div>')+'<div class="bub"></div>';
  row.querySelector('.bub').textContent=text;
  $('thread').appendChild(row); $('thread').scrollTop=$('thread').scrollHeight;
  if(!replay && typeof recordMsg==='function') recordMsg(!!me, text);
}
function gooseSay(text){ addBub(text,false); }

/* ---- Claude-powered goose lines (via /api/nag), with canned fallback ---- */
const NAG_API='/api/nag';
let history=[];
function pushHistory(s){ history.push(s); if(history.length>6) history.shift(); if(typeof saveState==='function') saveState(); }
function timeNow(){ try{return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch(e){return '';} }
function taskSummary(){ return tasks.map(t=>({text:t.text,done:!!t.done})); }
function addTyping(){
  const row=document.createElement('div'); row.className='row';
  row.innerHTML='<div class="av">🪿</div><div class="bub typing">…</div>';
  $('thread').appendChild(row); $('thread').scrollTop=$('thread').scrollHeight;
  return row.querySelector('.bub');
}
// Reserves a bubble slot immediately, then fills it from Claude (or the fallback string on any failure).
async function gooseSayAI(kind, ctx, fallback){
  const bub=addTyping();
  let text=fallback;
  try{
    const r=await fetch(NAG_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(Object.assign({kind,name,time:timeNow(),tasks:taskSummary(),history},ctx))});
    if(r.ok){ const j=await r.json(); if(j&&j.text) text=j.text; }
  }catch(e){/* offline / API down → keep fallback */}
  bub.classList.remove('typing'); bub.textContent=text;
  $('thread').scrollTop=$('thread').scrollHeight;
  if(typeof recordMsg==='function') recordMsg(false, text);
}
function updateHud(){
  $('xp').style.width=Math.min(100,(xp%100))+'%';
  $('lvl').textContent=Math.floor(xp/100)+1;
  $('streak').textContent=streak;
}
function renderTasks(){
  const c=$('taskList'); c.innerHTML='';
  tasks.forEach((t,i)=>{
    if(t.done) return;   // completed tasks vanish (animated out in markDone) — never re-rendered
    const d=document.createElement('div'); d.className='task'; d.setAttribute('data-task', i);
    d.innerHTML='<span class="t"></span><button class="mini d" data-d="'+i+'">✓ done</button><button class="mini g" data-g="'+i+'">👻 ghost</button>';
    d.querySelector('.t').textContent=t.text;
    c.appendChild(d);
  });
  c.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>requestProof(+b.dataset.d));
  c.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>markGhost(+b.dataset.g));
}
function markDone(i, opts){
  opts=opts||{};
  if(tasks[i].done) return;
  tasks[i].done=true; xp+=50; streak++; confetti();
  const t=tasks[i].text; pushHistory('completed "'+t+'"');
  if(!opts.silent) gooseSayAI('done', {task:t}, pick(NAG.done).replace('{t}',t));
  if(tasks.every(x=>x.done)) gooseSayAI('allDone', {}, pick(NAG.allDone));
  updateHud();
  const el=$('taskList').querySelector('[data-task="'+i+'"]');
  if(el) animateTaskOut(el); else renderTasks();   // smooth collapse-out; task data stays so streak/share count stay correct
}
// smoothly collapse a completed task out of the list, then drop it from the DOM
function animateTaskOut(el){
  const h=el.offsetHeight;
  el.style.height=h+'px'; el.getBoundingClientRect();          // lock height + force reflow
  el.classList.add('leaving');
  el.style.height='0'; el.style.marginBottom='0'; el.style.paddingTop='0'; el.style.paddingBottom='0';
  let gone=false;
  const finish=()=>{ if(gone) return; gone=true; if(el.parentNode) el.parentNode.removeChild(el); };
  el.addEventListener('transitionend', e=>{ if(e.propertyName==='height') finish(); });
  setTimeout(finish, 520);                                     // fallback if transitionend doesn't fire
}

/* ---- Proof-or-it-didn't-happen: snap a photo, Claude vision judges it ---- */
let proofIdx=-1;
function requestProof(i){ proofIdx=i; const inp=$('proofInput'); inp.value=''; inp.click(); }
function onProofPicked(file){
  if(proofIdx<0 || !file) return;
  const i=proofIdx; proofIdx=-1;
  const reader=new FileReader();
  reader.onload=()=>judgeProof(i, reader.result);
  reader.readAsDataURL(file);
}
async function judgeProof(i, dataUrl){
  const t=tasks[i].text;
  const bub=addTyping(); bub.textContent='👀 Goose is inspecting the evidence…';
  try{
    const r=await fetch('/api/judge',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({task:t, image:dataUrl})});
    if(r.status===503){ bub.remove(); markDone(i); return; } // no API key → don't block
    if(r.ok){
      const j=await r.json();
      bub.classList.remove('typing'); bub.textContent=j.line||'';
      if(j.pass){ markDone(i,{silent:true}); }
      else { pushHistory('failed proof for "'+t+'"'); }
      return;
    }
    throw new Error('bad');
  }catch(e){ bub.remove(); markDone(i); } // API down → accept rather than break the demo
}

/* ---- Goose tattles to your friends — AI-written, referral-tracked growth loop ----
   The shared link carries ?from=<you> so the friend lands on a personalized
   page ("X sicced Goose on you"). That closes the loop + makes virality real. */
function tattleLink(){ return 'https://goose-lockin.vercel.app/?from='+encodeURIComponent(name||'a friend'); }
async function tattleMessage(friend){
  const pending=tasks.filter(t=>!t.done);
  const t=((pending[0]||tasks[0])||{}).text || 'their tasks';
  let line='🪿 GOOSE INTERVENTION 🪿 '+friend+' is dramatically avoiding "'+t+'" and their streak is in shambles. Someone has to step in.';
  try{
    const r=await fetch(NAG_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({kind:'tattle', name, friend, task:t, tasks:taskSummary(), time:timeNow(), history})});
    if(r.ok){ const j=await r.json(); if(j&&j.text) line=j.text.trim(); }
  }catch(e){/* offline → keep fallback */}
  return line+'\n\n'+tattleLink();
}
/* opt-in auto-tattle: Goose alerts a saved buddy whenever you procrastinate.
   NOTE: a PWA can't silently send for you — this opens the pre-filled message;
   you tap send. Truly-silent delivery + a persistent friend opt-out need the
   Telegram-bot backend (next step). */
function getBuddy(){ try{ return JSON.parse(localStorage.getItem('goose-buddy')||'null'); }catch(e){ return null; } }
function setBuddy(b){ try{ b?localStorage.setItem('goose-buddy',JSON.stringify(b)):localStorage.removeItem('goose-buddy'); }catch(e){} }
async function autoTattle(task){
  const b=getBuddy(); if(!b||!b.auto||!b.name) return;
  gooseSay('Auto-tattling to '+b.name+'… you brought this on yourself. 🪿');
  const msg=await tattleMessage(b.name);
  setTimeout(()=>window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'),600);
}
function tattle(){
  const ov=document.createElement('div'); ov.id='tattleModal';
  ov.style.cssText='position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML=
    '<div style="background:var(--card);color:var(--ink);max-width:380px;width:100%;border-radius:22px;padding:18px;box-shadow:var(--shadow)">'+
      '<h3 style="font-family:\'Baloo 2\';margin:0 0 4px;font-size:20px">🚨 Sic Goose on a friend</h3>'+
      '<p style="margin:0 0 10px;font-size:13px;color:var(--muted);font-weight:700">Goose hunts them too. They’ll know it was you. 🪿</p>'+
      '<input id="tattleName" placeholder="friend’s name" autocomplete="off" style="width:100%;height:46px;padding:0 14px;font-size:16px;font-family:Nunito;font-weight:700;border:2.5px solid #ECE6D8;border-radius:14px;outline:none;margin-bottom:10px;background:var(--bg);color:var(--ink)" />'+
      '<label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink);margin:0 0 10px;cursor:pointer"><input type="checkbox" id="tattleAuto" style="width:18px;height:18px;accent-color:var(--coral)" />🔁 Auto-mode: tattle to them every time I ghost a task</label>'+
      '<div id="tattlePreview" style="background:var(--bubble);border-radius:14px;padding:12px;font-size:14px;font-weight:600;line-height:1.4;min-height:64px;white-space:pre-wrap;margin-bottom:12px">Goose is sharpening the tattle…</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
        '<button id="tWa" class="btn green" style="flex:1;min-width:110px;font-size:15px;padding:12px">WhatsApp</button>'+
        '<button id="tShare" class="btn" style="flex:1;min-width:110px;font-size:15px;padding:12px">Share</button>'+
        '<button id="tCopy" class="btn ghost" style="flex:1;min-width:84px;font-size:15px;padding:12px">Copy</button>'+
      '</div>'+
      '<button id="tClose" style="margin-top:10px;width:100%;background:none;border:none;color:var(--muted);font-weight:700;font-family:\'Baloo 2\';font-size:14px;cursor:pointer">cancel</button>'+
    '</div>';
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  $('tClose').onclick=close; ov.onclick=e=>{ if(e.target===ov) close(); };
  let current='';
  async function refresh(){
    const friend=$('tattleName').value.trim()||'Your friend';
    $('tattlePreview').textContent='Goose is sharpening the tattle…';
    current=await tattleMessage(friend);
    $('tattlePreview').textContent=current;
  }
  $('tattleName').addEventListener('input',()=>{ clearTimeout(window._tt); window._tt=setTimeout(refresh,500); });
  const saved=getBuddy(); if(saved){ $('tattleName').value=saved.name||''; $('tattleAuto').checked=!!saved.auto; }
  refresh();
  function savePref(){ const f=$('tattleName').value.trim(); const auto=$('tattleAuto').checked; if(f&&auto) setBuddy({name:f,auto:true}); else if(!auto) setBuddy(null); }
  function done(){ const f=$('tattleName').value.trim()||'Your friend'; savePref(); close(); gooseSay(f+' has been notified. '+($('tattleAuto')&&getBuddy()&&getBuddy().auto?'Goose will keep '+f+' posted automatically. ':'')+'No hiding from the flock now. 🪿'); }
  $('tWa').onclick=()=>{ window.open('https://wa.me/?text='+encodeURIComponent(current),'_blank'); done(); };
  $('tShare').onclick=()=>{ if(navigator.share){ navigator.share({text:current}).then(done).catch(()=>{}); } else { try{navigator.clipboard.writeText(current);}catch(e){} done(); } };
  $('tCopy').onclick=()=>{ savePref(); try{navigator.clipboard.writeText(current);}catch(e){} $('tCopy').textContent='Copied ✓'; };
}
function markGhost(i){
  if(tasks[i].done) return;
  streak=0;
  const t=tasks[i].text; pushHistory('ghosted "'+t+'"');
  gooseSayAI('ghost', {task:t}, pick(NAG.ghost).replace('{t}',t));
  updateHud(); renderTasks();
  autoTattle(t); // opt-in: alert saved buddy when you procrastinate
}
function nagSomeone(){
  const pending=tasks.filter(t=>!t.done);
  if(!pending.length){ gooseSayAI('allDone', {}, pick(NAG.allDone)); return; }
  const t=pick(pending); nagLevel[t.text]=(nagLevel[t.text]||0)+1;
  const lv=Math.min(4,nagLevel[t.text]);
  pushHistory('nagged about "'+t.text+'" (level '+lv+')');
  gooseSayAI('nag', {task:t.text, nagLevel:lv}, pick(NAG['l'+lv]).replace('{t}',t.text));
}
function confetti(){

/* ---- persistence: Goose remembers across app closes (localStorage, this device) ---- */
const STORE='goose-state-v1';
let thread=[];        // mirror of the chat ([{me,text}]) so the conversation survives a close
let phase='name';     // 'name' until Goose knows who you are, then 'tasks'
let calImported=false;
function recordMsg(me, text){ thread.push({me:!!me, text:text}); if(thread.length>60) thread=thread.slice(-60); saveState(); }
function saveState(){
  try{
    localStorage.setItem(STORE, JSON.stringify({name,tasks,xp,streak,nagLevel,history,thread:thread.slice(-60),phase,calImported}));
    localStorage.setItem('goose-tasks', JSON.stringify(tasks.map(t=>t.text)));  // keep screentime.html in sync
    localStorage.setItem('goose-name', name);
  }catch(e){}
}
function loadState(){
  try{ const s=JSON.parse(localStorage.getItem(STORE)||'null');
    if(s && typeof s==='object'){
      name=s.name||''; tasks=Array.isArray(s.tasks)?s.tasks:[]; xp=s.xp||0; streak=s.streak||0;
      nagLevel=s.nagLevel||{}; history=Array.isArray(s.history)?s.history:[];
      thread=Array.isArray(s.thread)?s.thread:[]; phase=s.phase||'name'; calImported=!!s.calImported;
      return true;
    }
  }catch(e){}
  return false;
}
function replayThread(){ $('thread').innerHTML=''; thread.forEach(m=>addBub(m.text, m.me, true)); }

/* ---- add a task (from the chat box OR the calendar) ---- */
function addTask(text, opts){
  opts=opts||{};
  text=String(text||'').trim(); if(!text) return false;
  if(tasks.some(t=>t.text.toLowerCase()===text.toLowerCase())) return false;  // dedupe
  tasks.push({text,done:false}); nagLevel[text]=1; pushHistory('set task "'+text+'"');
  renderTasks(); saveState();
  if(opts.nag) gooseSayAI('nag', {task:text, nagLevel:1}, pick(NAG.l1).replace('{t}',text));
  return true;
}

/* ---- calendar events become Goose's tasks ---- */
function importCalendar(items){
  let added=0;
  (items||[]).forEach(ev=>{
    let title=(ev.summary||'(busy)'), when='';
    try{ if(ev.start && ev.start.dateTime){ when=new Date(ev.start.dateTime).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})+' — '; } }catch(e){}
    let text=when+title;
    if(!tasks.some(t=>t.text===text)){ tasks.push({text,done:false}); nagLevel[text]=1; added++; }
  });
  calImported=true; renderTasks(); saveState();
  if(added){ pushHistory('imported '+added+' calendar event(s)');
    gooseSayAI('calendar', {count:added}, "Found "+added+" thing"+(added===1?'':'s')+" you scheduled. Let's see how many you actually do. 🪿");
  } else {
    gooseSayAI('calendarEmpty', {}, "Your calendar's empty today. Suspicious. What are you really up to? 🪿");
  }
}

/* ---- chat composer: first message = your name, then each line = a task ---- */
$('composer').addEventListener('submit', e=>{
  e.preventDefault();
  const val=$('chatInput').value.trim(); if(!val) return;
  $('chatInput').value='';
  addBub(val, true);
  if(phase==='name'){
    name=val; phase='tasks'; $('chatInput').placeholder='Tell Goose a task…'; saveState();
    gooseSayAI('named', {}, name+". Noted. Connect your calendar so I can see what you're dodging — or just type a task and I'll start hunting. 🪿");
  } else {
    if(!addTask(val, {nag:true})) gooseSayAI('dupe', {task:val}, "You already told me that one. I don't forget anymore. 🪿");
  }
});

/* ---- boot: open straight into the chat; remember everything from last time ---- */
function boot(){
  const returning=loadState();
  show('s-chat'); updateHud();
  if($('chatInput')) $('chatInput').placeholder = (phase==='name') ? 'Message Goose…' : 'Tell Goose a task…';
  if(returning && thread.length){
    replayThread(); renderTasks();
    gooseSayAI('welcomeback', {}, (name?name+'. ':'')+'Back already? I kept everything — your tasks, your excuses, the streak. 🪿');
  } else {
    name=''; tasks=[]; xp=0; streak=0; nagLevel={}; history=[]; thread=[]; phase='name'; calImported=false;
    renderTasks();
    gooseSayAI('askname', {}, 'Oh good, a volunteer. What do I call you? I need a name to scream when you start slacking. 🪿');
  }
  saveState();
}
boot();

let deferredPrompt=null;
const installBtn=$('installBtn'), installHint=$('installHint');
const standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);

}

/* ---- Web Push: let Goose ping your phone WHILE you're off in another app ---- */
const VAPID_PUBLIC='BIGaKxtFiujN9YYaPIwPew-xsTKQdhA0aHslNgXwkXDSgh4rJ32kB7PL8YjS1JIW3DcOFctMzcysYEG4SjxkRiM'; // PUBLIC VAPID key — safe to commit (the PRIVATE key lives only in a Vercel env var)
const pushSupported='serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
let pushSub=null;
function urlB64ToUint8(s){const pad='='.repeat((4-s.length%4)%4);const b=(s+pad).replace(/-/g,'+').replace(/_/g,'/');const raw=atob(b);const out=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);return out;}
async function subscribePush(){const reg=await navigator.serviceWorker.ready;return await reg.pushManager.getSubscription()||await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)});}
async function enablePush(){
  if(!pushSupported||!VAPID_PUBLIC) return false;
  let perm=Notification.permission;
  if(perm==='default') perm=await Notification.requestPermission();
  if(perm!=='granted') return false;
  try{ pushSub=await subscribePush(); try{localStorage.setItem('goose-push','1');}catch(e){} return !!pushSub; }catch(e){ return false; }
}
// fired when you bail mid-task → server pushes you a few seconds later, while you're still in the other app
function sendAwayPush(){
  if(!pushSub) return;
  const t=(tasks.find(x=>!x.done)||{}).text||'';
  try{ fetch('/api/push',{method:'POST',keepalive:true,headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:pushSub,name,task:t})}); }catch(e){}
}
// silently re-acquire a subscription if you already granted permission in a past session
(async()=>{ if(pushSupported&&VAPID_PUBLIC&&Notification.permission==='granted'){ try{ pushSub=await subscribePush(); }catch(e){} } })();
// opt-in button
(function(){
  const pb=$('pushBtn'); if(!pb) return;
  if(!pushSupported){ pb.style.display='none'; return; }
  if(Notification.permission==='granted') pb.textContent='🔔 Alerts on ✓';
  pb.addEventListener('click',async()=>{
    pb.textContent='🔔 Asking…';
    const ok=await enablePush();
    pb.textContent = ok ? '🔔 Alerts on ✓'
      : (isIOS && !standalone ? '🔔 Install first' : '🔔 Blocked');
  });
})();

/* ---- Focus watch: catch them bailing out of Goose mid-task ---- */
const AWAY_TROLL_MS=12000; // gone longer than this (ms) → goose calls you out on return. Low for demos; bump up for real use.
let hiddenAt=null;
function chatActive(){ return !$('s-chat').classList.contains('hide') && tasks.some(t=>!t.done); }
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    if(chatActive()){ hiddenAt=Date.now(); sendAwayPush(); } // start the clock + ping the phone while you're gone
    else hiddenAt=null;
  } else if(hiddenAt){
    const awayMs=Date.now()-hiddenAt; hiddenAt=null;       // Date.now() = true wall-clock, accurate even if the OS paused our JS
    if(awayMs>=AWAY_TROLL_MS && chatActive()){
      const sec=Math.round(awayMs/1000);
      const t=(tasks.find(x=>!x.done)||{}).text||'';
      pushHistory('left the app for '+sec+'s while "'+t+'" was unfinished');
      gooseSayAI('offtask', {task:t, awaySeconds:sec}, pick(NAG.offtask));
    }
  }
});
</script>

<script src="https://accounts.google.com/gsi/client" async></script>

<script>
  (function(){
    var btn=document.getElementById('calConnect'), st=document.getElementById('calStatus'), dc=document.getElementById('calDisconnect');
    if(!btn) return;
    function say(m){ st.textContent=m; }
    function setConnected(on){
      btn.textContent = on ? '🔄 Connected' : '🗓️ Calendar';
      if(dc) dc.style.display = on ? 'inline-block' : 'none';
    }
    btn.addEventListener('click',function(){
      if(!window.GooseCal){ say('Calendar connector still loading — try again in a sec.'); return; }
      if(!GooseCal.isConfigured()){ say('Calendar isn’t set up yet.'); return; }
      say('Opening Google… approve the “unverified app” screen (Advanced → Continue) to let Goose in. 🪿');
      GooseCal.connect().then(function(){
        say('✅ Connected. Reading your day…'); setConnected(true);
        return GooseCal.listToday();
      }).then(function(items){
        items=items||[];
        say('✅ Pulled '+items.length+' thing'+(items.length===1?'':'s')+' off your calendar. Nowhere to hide. 🪿');
        if(typeof importCalendar==='function') importCalendar(items);
      }).catch(function(e){ say('✗ '+((e&&e.message)||'Could not connect.')); });
    });
    if(dc) dc.addEventListener('click',function(){
      try{ if(window.GooseCal) GooseCal.disconnect(); }catch(e){}   // revokes the Google token
      try{ calImported=false; }catch(e){}
      try{ if(typeof saveState==='function') saveState(); }catch(e){}
      setConnected(false);
      say('🔌 Disconnected — Goose can’t see your calendar anymore. Your tasks stay put.');
      try{ if(typeof gooseSay==='function') gooseSay("Disconnected from your calendar. I'll pretend I didn't see all that. The tasks stay, though. 🪿"); }catch(e){}
    });
  })();
</script>
