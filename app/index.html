<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Goose</title>
<meta name="theme-color" content="#E7902C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Goose" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    /* color — warm, premium, characterful (names preserved; values refined) */
    --bg:#F6F1E7; --bg-2:#EFE7D7; --card:#FFFDF9; --line:#E8DFCE;
    --ink:#211E19; --ink-2:#544F45; --muted:#8B8475;
    --amber:#E7902C; --amber-d:#A2570F; --amber-soft:#FBEAD0; --disc:#FBEAD0;
    --coral:#D9512F; --coral-soft:#FBE3D8; --coral-d:#8E2E15;
    --green:#2E9E66; --green-soft:#DCF1E5; --green-d:#155E3C;
    --bubble:#F0E8D8;
    /* elevation — soft warm-tinted depth (no hard offsets) */
    --shadow:0 1px 2px rgba(58,42,20,.05), 0 6px 18px -7px rgba(58,42,20,.14);
    --shadow-sm:0 1px 2px rgba(58,42,20,.07);
    --shadow-md:0 2px 6px -2px rgba(58,42,20,.10), 0 10px 26px -10px rgba(58,42,20,.16);
    --shadow-lg:0 10px 28px -8px rgba(58,42,20,.18), 0 24px 60px -20px rgba(58,42,20,.22);
    /* radii scale */
    --r-xs:8px; --r-sm:12px; --r-md:16px; --r-lg:20px; --r-xl:26px; --r-pill:999px;
    /* type */
    --font-display:"Fraunces",Georgia,serif;
    --font-ui:"Hanken Grotesk",system-ui,-apple-system,"Segoe UI",sans-serif;
    /* motion */
    --ease:cubic-bezier(.22,.61,.36,1); --dur:.2s;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg); color:var(--ink); font-family:var(--font-ui); font-weight:500; overflow:hidden; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility}
  .app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--bg)}
  h1,h2,h3,.fun{font-family:var(--font-display);font-weight:600;letter-spacing:-.01em}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;padding:20px;overflow-y:auto;transition:opacity .28s var(--ease)}
  .hide{opacity:0;pointer-events:none}
  :focus-visible{outline:2.5px solid var(--amber);outline-offset:2px}
  ::selection{background:var(--amber-soft)}
  /* buttons — refined, soft press (no toy drop) */
  .btn{font-family:var(--font-ui);font-weight:800;font-size:16px;letter-spacing:-.01em;border:none;border-radius:var(--r-md);padding:14px 18px;
       background:var(--amber);color:#fff;box-shadow:var(--shadow-md);cursor:pointer;width:100%;
       transition:transform var(--dur) var(--ease),box-shadow var(--dur) var(--ease),background var(--dur) var(--ease)}
  .btn:hover{background:#EE9A39}
  .btn:active{transform:translateY(1px) scale(.99);box-shadow:var(--shadow-sm)}
  .btn.coral{background:var(--coral)} .btn.coral:hover{background:#E25C3A}
  .btn.green{background:var(--green)} .btn.green:hover{background:#36AE73}
  .btn.ghost{background:transparent;color:var(--muted);box-shadow:none;border:1.5px solid var(--line)} .btn.ghost:hover{background:var(--bg-2);color:var(--ink-2)}
  /* HUD */
  .hud{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--shadow-sm);margin-bottom:14px;flex:none}
  .hud-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .lvl{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--ink);display:flex;align-items:center;gap:6px}
  .streak{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--coral);display:flex;align-items:center;gap:6px}
  .xpbar{height:9px;background:var(--bg-2);border-radius:var(--r-pill);overflow:hidden}
  .xpfill{height:100%;width:0;background:linear-gradient(90deg,var(--amber),#F4B85F);border-radius:var(--r-pill);transition:width .6s var(--ease)}
  /* chat thread */
  .thread{flex:1;overflow-y:auto;padding:4px 2px 8px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
  .row{display:flex;align-items:flex-end;gap:8px;max-width:90%;animation:rise .32s var(--ease) both}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .row.me{align-self:flex-end;flex-direction:row-reverse}
  .av{width:30px;height:30px;flex:none;border-radius:50%;background:var(--amber-soft);display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:var(--shadow-sm)}
  .bub{background:var(--bubble);color:var(--ink);padding:11px 15px;border-radius:18px;font-size:15.5px;font-weight:500;line-height:1.45;border-bottom-left-radius:6px;box-shadow:var(--shadow-sm)}
  .row.me .bub{background:var(--amber);color:#fff;font-weight:600;border-bottom-left-radius:18px;border-bottom-right-radius:6px}
  .bub.typing{opacity:.6;font-style:italic}
  .bub.photo{padding:5px;background:var(--amber)}
  .proofimg{display:block;max-width:172px;max-height:212px;border-radius:14px;object-fit:cover}
  /* PASS / FAIL verdict — the hero moment */
  .bub.verdict{border:1px solid;box-shadow:var(--shadow-md);padding:13px 15px;border-bottom-left-radius:18px}
  .bub.verdict.pass{background:var(--green-soft);color:var(--green-d);border-color:#C2E6D1}
  .bub.verdict.fail{background:var(--coral-soft);color:var(--coral-d);border-color:#F2C8BA}
  .vbadge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-display);font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:4px 11px;border-radius:var(--r-pill);margin-bottom:7px;color:#fff}
  .verdict.pass .vbadge{background:var(--green)} .verdict.fail .vbadge{background:var(--coral)}
  .vbadge svg{width:13px;height:13px;stroke:#fff;stroke-width:3;fill:none}
  .vline{font-size:15px;font-weight:500;line-height:1.4}
  /* tasks */
  .tasks{flex:none;padding-top:12px;display:flex;flex-direction:column}
  .tasks:empty{padding-top:0}
  .task{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:11px 11px 11px 15px;box-shadow:var(--shadow-sm);margin-bottom:9px;overflow:hidden;
        transition:height .34s var(--ease),opacity .26s ease,transform .34s var(--ease),margin .34s ease,padding .34s ease,border-color .2s}
  .task:last-child{margin-bottom:0}
  .task.done{opacity:.5}
  .task.leaving{opacity:0;transform:translateX(44px) scale(.97)}
  .task .t{flex:1;font-family:var(--font-ui);font-weight:700;font-size:15px;line-height:1.3}
  .task.done .t{text-decoration:line-through}
  .task.shake{animation:shake .42s cubic-bezier(.36,.07,.19,.97);border-color:var(--coral)}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
  .mini{font-family:var(--font-ui);font-weight:800;font-size:13px;letter-spacing:-.01em;border:none;border-radius:var(--r-sm);padding:9px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:transform var(--dur) var(--ease),filter var(--dur)}
  .mini:active{transform:scale(.95)}
  .mini svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.2;fill:none}
  .mini.d{background:var(--green);color:#fff;box-shadow:var(--shadow-sm)} .mini.d:hover{filter:brightness(1.05)}
  .mini.g{background:transparent;color:var(--muted);border:1.5px solid var(--line)} .mini.g:hover{color:var(--ink-2)}
  .barbtns{flex:none;display:flex;gap:8px;padding-top:10px}
  .barbtns .btn{font-size:15px;padding:13px}
  /* layout: chat fills the screen, toolkit scrolls in below */
  #s-chat{display:block;padding:0}
  .chat-hero{height:100dvh;display:flex;flex-direction:column;padding:20px 20px 14px}
  .chat-hero .thread{min-height:0}
  .scrollcue{flex:none;text-align:center;font-family:var(--font-ui);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);opacity:.6;padding:11px 0 2px;animation:cuebob 2s ease-in-out infinite}
  @keyframes cuebob{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
  /* toolkit */
  .tools{padding:6px 20px 34px;display:flex;flex-direction:column;gap:10px;background:linear-gradient(180deg,var(--bg),var(--bg-2))}
  .tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tool{font-family:var(--font-ui);font-weight:700;font-size:13.5px;letter-spacing:-.01em;border:1px solid var(--line);border-radius:var(--r-md);
        padding:14px 10px;background:var(--card);color:var(--ink);cursor:pointer;display:flex;flex-direction:column;align-items:center;
        justify-content:center;gap:7px;text-align:center;line-height:1.15;min-height:66px;box-shadow:var(--shadow-sm);
        transition:transform var(--dur) var(--ease),box-shadow var(--dur) var(--ease),border-color var(--dur)}
  .tool:hover{border-color:var(--amber);box-shadow:var(--shadow-md)}
  .tool:active{transform:scale(.97)}
  .tool.wide{grid-column:1 / -1;flex-direction:row;gap:9px;min-height:52px}
  .tool svg{width:21px;height:21px;stroke:var(--amber-d);stroke-width:1.9;fill:none;flex:none}
  .tool .lbl{display:block}
  .toolnote{margin:2px 0 0;font-size:12.5px;font-weight:600;color:var(--muted);text-align:center;line-height:1.45}
  .toolnote.calwarn{font-weight:500;font-size:11.5px;opacity:.85}
  .toolnote:empty{display:none}
  .toolhint{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:12px 14px;font-size:13px;line-height:1.5;color:var(--ink-2);box-shadow:var(--shadow-sm)}
  /* share card */
  .card-wrap{flex:1;display:flex;flex-direction:column;justify-content:center}
  #card{background:linear-gradient(150deg,#F0A23E,#E07F24);border-radius:var(--r-xl);padding:26px 24px;color:#fff;text-align:center;box-shadow:var(--shadow-lg)}
  #card .goosec{width:88px;margin:0 auto 8px;display:block;filter:drop-shadow(0 4px 8px rgba(120,60,10,.25))}
  #card h2{font-family:var(--font-display);font-weight:600;font-size:25px;margin:4px 0;color:#fff}
  #card .big{font-family:var(--font-display);font-weight:600;font-size:48px;line-height:1;margin:10px 0}
  #card .nagq{background:rgba(255,255,255,.16);border-radius:var(--r-md);padding:13px;font-weight:500;font-size:15px;line-height:1.4;margin:14px 0;font-style:italic}
  #card .url{font-weight:800;font-size:13px;letter-spacing:.02em;opacity:.92;margin-top:10px}
  .confetti{position:absolute;top:-10px;font-size:22px;animation:fall 1.15s ease-in forwards;pointer-events:none;z-index:40}
  @keyframes fall{to{transform:translateY(105dvh) rotate(360deg);opacity:0}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div class="app">

  <!-- CHAT — opens straight here; chat fills the screen, toolkit scrolls in below -->
  <section class="screen" id="s-chat">
    <div class="chat-hero">
      <div class="hud">
        <div class="hud-top">
          <span class="lvl">🪿 Lvl <span id="lvl">1</span></span>
          <span class="streak">🔥 <span id="streak">0</span> streak</span>
        </div>
        <div class="xpbar"><div class="xpfill" id="xp"></div></div>
      </div>
      <div class="thread" id="thread"></div>
      <div class="tasks" id="taskList"></div>

      <!-- mode toggle: Task = Goose holds you accountable · Chat = just talk -->
      <div id="modeToggle" role="tablist" aria-label="Mode" style="display:flex;gap:4px;margin-top:12px;background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:4px">
        <button type="button" class="modebtn" data-mode="task" style="flex:1;border:none;border-radius:10px;padding:9px 6px;font-family:var(--font-ui);font-weight:800;font-size:13.5px;letter-spacing:-.01em;cursor:pointer;transition:all var(--dur) var(--ease)">Task</button>
        <button type="button" class="modebtn" data-mode="chat" style="flex:1;border:none;border-radius:10px;padding:9px 6px;font-family:var(--font-ui);font-weight:800;font-size:13.5px;letter-spacing:-.01em;cursor:pointer;transition:all var(--dur) var(--ease)">Chat</button>
      </div>
      <!-- composer: name first, then Task-mode logs an accountable task · Chat-mode just talks -->
      <form id="composer" autocomplete="off" style="display:flex;gap:8px;margin-top:8px">
        <input id="chatInput" placeholder="Message Goose…" autocomplete="off" style="flex:1;min-width:0;height:52px;padding:0 16px;font-size:16px;font-family:var(--font-ui);font-weight:600;color:var(--ink);background:var(--card);border:1.5px solid var(--line);border-radius:var(--r-md);outline:none;box-shadow:var(--shadow-sm)" />
        <button class="btn coral" id="send" type="submit" aria-label="Send" style="width:52px;height:52px;flex:none;padding:0;display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
      </form>

      <div class="scrollcue" aria-hidden="true">More — calendar · buddy · share</div>
    </div>

    <!-- TOOLKIT — scroll down to reveal; scroll up for just the chat -->
    <div class="tools">
      <div class="tools-grid">
        <button class="tool" id="calConnect"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span class="lbl">Calendar</span></button>
        <button class="tool" id="toCard"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg><span class="lbl">Share card</span></button>
        <button class="tool" id="tattleLink"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="lbl">Buddy</span></button>
        <button class="tool" id="pushBtn"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg><span class="lbl">Notify me</span></button>
        <button class="tool wide" id="installBtn" style="display:none"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg><span class="lbl">Install Goose</span></button>
      </div>
      <p id="calStatus" class="toolnote"></p>
      <button id="calDisconnect" style="display:none;align-self:center;background:none;border:none;font-family:var(--font-ui);font-weight:700;font-size:12.5px;color:var(--coral);text-decoration:underline;cursor:pointer;padding:4px 6px">Disconnect Google Calendar</button>
      <p class="toolnote calwarn">Google shows an “unverified app” notice — tap <b>Advanced → Continue</b>. Goose only reads your calendar. 🪿</p>
      <div id="installHint" class="toolhint" style="display:none"></div>
    </div>

    <!-- proof-or-it-didn't-happen: hidden camera/file input judged by Claude vision -->
    <input type="file" id="proofInput" accept="image/*" capture="environment" style="display:none" />
  </section>

  <!-- CARD -->
  <section class="screen hide" id="s-card">
    <div class="card-wrap">
      <div id="card">
        <svg class="goosec" viewBox="0 0 220 190" aria-hidden="true"><circle cx="110" cy="98" r="80" fill="rgba(255,255,255,.22)"/><path d="M40 96 C55 72 78 64 100 66 C120 50 138 40 152 40 Q175 40 196 52 Q180 58 166 60 C168 78 150 92 140 104 C134 120 120 140 96 148 C70 154 50 140 44 120 C42 110 40 102 40 96 Z" fill="#fff" stroke="#C0721F" stroke-width="2.5" stroke-linejoin="round"/><path d="M182 46 L201 52 L182 59 Z" fill="#C0721F"/><circle cx="158" cy="50" r="3.6" fill="#2A2A28"/></svg>
        <h2 id="cardName">I survived Goose today</h2>
        <div class="big"><span id="cardDone">0</span>/<span id="cardTotal">3</span> done</div>
        <div class="nagq" id="cardNag">"Bold of you to ignore a goose."</div>
        <div class="url">goose-lockin.vercel.app</div>
      </div>
      <div style="height:14px"></div>
      <button class="btn green" id="share">Share my Goose card</button>
      <div style="height:8px"></div>
      <button class="btn ghost" id="back">← back to Goose</button>
    </div>
  </section>

</div>

<script>
const NAG = {
  intro: [
    "Oh, NOW you want accountability. Fine. Let's document today's failures in real time.",
    "Three tasks. We both know you'll do one and lie about the other two. Begin. 🪿",
    "You downloaded a goose to do your job for you. Rock bottom has a mascot now.",
    "Hand over the list. I've seen your follow-through — I brought snacks for the disappointment.",
    "Another big dreamer with zero spine. Welcome. Let's see how fast you fold.",
    "Let me guess: today's the day you finally change. It is not. But let's pretend together.",
    "I'm your new manager. Unpaid, unhinged, and unfortunately for you, unrelenting.",
    "Tasks. Now. The sooner you start, the sooner I stop telling the flock how slow you are."
  ],
  l1: [
    "{t}. It won't do itself. Neither will you, historically, but let's try. 🪿",
    "Gentle reminder about {t}. Savor the 'gentle.' It's the last kind thing I say today.",
    "{t}. Small task. Easy. For a functional person. So, a stretch for you.",
    "Putting {t} right here — where you can ignore it personally and on purpose.",
    "{t} is waiting. So is your entire wasted potential, but one thing at a time.",
    "Soft little nudge: {t}. They stop being soft. I stop being patient. Move.",
    "{t}. Go on. Prove me wrong for once in your sad little day."
  ],
  l2: [
    "Still no {t}? You've checked your phone 40 times and helped yourself with zero of them.",
    "{t} is rotting. So is the version of you who swore they'd do it.",
    "Bold of you to ignore {t} this confidently. Confidence you have NOT earned.",
    "We're at zero on {t}. A snail laps you daily. The snail, at least, has goals.",
    "{t}? Still nothing? Your to-do list is just a wish list with extra shame.",
    "You and {t} are at war. {t} isn't even awake. You're losing to a sleeping noun.",
    "Ah, {t} — untouched. Like your ambition. And that gym membership."
  ],
  l3: [
    "{t} STILL isn't done. I've stopped being surprised. That's the tragic part.",
    "Imagine promising a goose you'd do {t} and folding this completely. Historic cowardice.",
    "I believed in you about {t} once. A lapse in judgment I've reported to myself.",
    "{t} undone again. I started a museum. The whole exhibit is just you stalling.",
    "We've reached the part where {t} becomes your entire personality. A dull one.",
    "{t}. Still. Your ancestors crossed oceans. You can't cross the room to your laptop.",
    "At this point {t} isn't a task — it's a documentary about a person giving up."
  ],
  l4: [
    "{t}. NOW. I will haunt you. I will honk in your dreams. I will narrate your nap.",
    "I've told EVERY goose about {t}. There's a group chat. You're the topic. 🪿🪿🪿",
    "{t} or I follow you to the kitchen, the shower, the grave. Honestly, {t} is easier.",
    "We are past reminders. {t} is a hostage and you're the worst negotiator alive.",
    "Do {t} or I read your entire excuse history aloud, forever, at full volume.",
    "{t}. I'm not asking. I'm not blinking. You have everywhere to fail and I have nowhere to be.",
    "Finish {t} or I become the single loudest problem of your entire life. Try me."
  ],
  done: [
    "...you actually did it. I had a eulogy ready for your motivation. Wasted breath.",
    "{t}? Done?? Updating your file from 'lost cause' to 'briefly competent.'",
    "Look at you. A functioning adult. Cherish it — the feeling won't survive the hour.",
    "{t} is dead. You killed it. First useful thing you've done all day, statistically.",
    "Oh, so you CAN finish things. Filing that under 'evidence' to use against you later.",
    "Honk of victory. {t} done. I'm stunned — I genuinely thought you didn't have it in you.",
    "Streak lives. Don't get cocky. One task is not a personality transplant.",
    "Fine. {t} counts. Legally I must say good job. Good job. Now do the rest, slug.",
    "Incredible. The bare minimum, achieved heroically. No statues. No parade. But noted.",
    "Done. The other geese bet you'd quit. You just cost them money. Finally, useful.",
    "{t}: complete. I'd celebrate, but I've seen the sequel. It's called 'tomorrow' and you lose.",
    "You did it. A broken clock is right twice a day — and so, apparently, are you.",
    "Marked done. Slowly. Painfully. Like watching a sloth file its taxes. But done.",
    "The bar was on the floor and you still tripped getting over it. Yet here we are. {t} done.",
    "{t} finished. I'm proud and faintly disgusted at how long it took. Mostly proud. Barely.",
    "Done at last. I aged three goose-years in the wait. Don't make me wait like that again."
  ],
  ghost: [
    "Ghosting {t}? Logged. I'll bring it up at every milestone of your life.",

const pick = a => a[Math.floor(Math.random()*a.length)];
const $ = id => document.getElementById(id);
let tasks=[], xp=0, streak=0, nagLevel={}, name="";
// Pull just the NAME out of whatever the user typed ("yo my name's avi" -> "Avi").
function parseName(raw){
  let s=(raw||'').trim();
  const m=s.match(/(?:my name'?s?|my name is|i'?m|i am|call me|it'?s|this is)\s+(.+)/i);
  if(m) s=m[1];
  s=s.replace(/^(?:yo|hey+|hi+|hello|sup|well|um+|uh+|ok(?:ay)?|so)\b[\s,]*/i,'').trim();
  s=s.replace(/[^\p{L}\p{M}'’\- ]/gu,'').trim();
  const words=s.split(/\s+/).filter(Boolean).filter(w=>!/^(here|now|btw|lol|thanks|please|ok|okay)$/i.test(w)).slice(0,2);
  s=words.join(' ');
  const out = s || ((raw||'').replace(/[^\p{L}\p{M}'’\- ]/gu,'').trim().split(/\s+/)[0] || 'you');
  return out.replace(/\b\p{L}/gu,c=>c.toUpperCase()).slice(0,40);
}

function show(id){['s-chat','s-card'].forEach(s=>$(s).classList.toggle('hide',s!==id));}
function addBub(text, me, replay){

}
function gooseSay(text){ addBub(text,false); }

/* ---- Claude-powered goose lines (via /api/nag), with canned fallback ---- */
const NAG_API='/api/nag';
let history=[];
function pushHistory(s){ history.push(s); if(history.length>6) history.shift(); if(typeof saveState==='function') saveState(); }
function timeNow(){ try{return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch(e){return '';} }
function taskSummary(){ return tasks.map(t=>({text:t.text,done:!!t.done})); }
function addTyping(){
  const row=document.createElement('div'); row.className='row';
  row.innerHTML='<div class="av">🪿</div><div class="bub typing">…</div>';
  $('thread').appendChild(row); $('thread').scrollTop=$('thread').scrollHeight;
  return row.querySelector('.bub');
}
// Reserves a bubble slot immediately, then fills it from Claude (or the fallback string on any failure).
async function gooseSayAI(kind, ctx, fallback){
  const bub=addTyping();
  let text=fallback;
  try{
    const r=await fetch(NAG_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(Object.assign({kind,name,time:timeNow(),tasks:taskSummary(),history},ctx))});
    if(r.ok){ const j=await r.json(); if(j&&j.text) text=j.text; }
  }catch(e){/* offline / API down → keep fallback */}
  bub.classList.remove('typing'); bub.textContent=text;
  $('thread').scrollTop=$('thread').scrollHeight;
  if(typeof recordMsg==='function') recordMsg(false, text);
}
function updateHud(){
  $('xp').style.width=Math.min(100,(xp%100))+'%';
  $('lvl').textContent=Math.floor(xp/100)+1;
  $('streak').textContent=streak;
}
function renderTasks(){
  const c=$('taskList'); c.innerHTML='';
  tasks.forEach((t,i)=>{
    if(t.done) return;   // completed tasks vanish (animated out in markDone) — never re-rendered
    const d=document.createElement('div'); d.className='task'; d.setAttribute('data-task', i);
    d.innerHTML='<span class="t"></span><button class="mini d" data-d="'+i+'"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="3.5"/></svg>Prove it</button><button class="mini g" data-g="'+i+'">Ghost</button>';
    d.querySelector('.t').textContent=t.text;
    c.appendChild(d);
  });
  c.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>requestProof(+b.dataset.d));
  c.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>markGhost(+b.dataset.g));
}
function markDone(i, opts){
  opts=opts||{};
  if(tasks[i].done) return;
  tasks[i].done=true; xp+=50; streak++; confetti();
  const t=tasks[i].text; pushHistory('completed "'+t+'"');
  if(!opts.silent) gooseSayAI('done', {task:t}, pick(NAG.done).replace('{t}',t));
  if(tasks.every(x=>x.done)) gooseSayAI('allDone', {}, pick(NAG.allDone));
  updateHud();
  const el=$('taskList').querySelector('[data-task="'+i+'"]');
  if(el) animateTaskOut(el); else renderTasks();   // smooth collapse-out; task data stays so streak/share count stay correct
}
// smoothly collapse a completed task out of the list, then drop it from the DOM
function animateTaskOut(el){
  const h=el.offsetHeight;
  el.style.height=h+'px'; el.getBoundingClientRect();          // lock height + force reflow
  el.classList.add('leaving');
  el.style.height='0'; el.style.marginBottom='0'; el.style.paddingTop='0'; el.style.paddingBottom='0';
  let gone=false;
  const finish=()=>{ if(gone) return; gone=true; if(el.parentNode) el.parentNode.removeChild(el); };
  el.addEventListener('transitionend', e=>{ if(e.propertyName==='height') finish(); });
  setTimeout(finish, 520);                                     // fallback if transitionend doesn't fire
}

/* ---- Proof-or-it-didn't-happen: snap a photo, Claude vision judges it ---- */
let proofIdx=-1;
function requestProof(i){ proofIdx=i; const inp=$('proofInput'); inp.value=''; inp.click(); }
function onProofPicked(file){
  if(proofIdx<0 || !file) return;
  const i=proofIdx; proofIdx=-1;
  const reader=new FileReader();
  reader.onload=()=>judgeProof(i, reader.result);
  reader.readAsDataURL(file);
}
async function judgeProof(i, dataUrl){
  const t=tasks[i].text;
  addPhoto(dataUrl);                                    // show the evidence in the chat
  const bub=addTyping(); bub.textContent='🔍 Goose is examining the evidence…';
  try{
    const r=await fetch('/api/judge',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({task:t, image:dataUrl})});
    if(r.status===503){ bub.remove(); gooseSay("(My eyes are offline — I'll take your word. This ONCE.) 🪿"); markDone(i); return; }
    if(r.ok){
      const j=await r.json();
      bub.classList.remove('typing'); bub.classList.add('verdict', j.pass?'pass':'fail');
      bub.innerHTML='';
      var vb=document.createElement('div'); vb.className='vbadge';
      vb.innerHTML=(j.pass?'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>PASS':'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>FAIL');
      var vl=document.createElement('div'); vl.className='vline'; vl.textContent=j.line||'';
      bub.appendChild(vb); bub.appendChild(vl);
      if(typeof recordMsg==='function') recordMsg(false, (j.pass?'PASS — ':'FAIL — ')+(j.line||''));
      if(j.pass){ markDone(i,{silent:true}); }
      else { shakeTask(i); pushHistory('failed proof for "'+t+'"'); }
      return;
    }
    throw new Error('bad');
  }catch(e){ bub.remove(); gooseSay("(Couldn't make that out — fine, it counts. This time.) 🪿"); markDone(i); }
}
function addPhoto(dataUrl){
  const row=document.createElement('div'); row.className='row me';
  row.innerHTML='<div class="bub photo"></div>';
  const img=document.createElement('img'); img.className='proofimg'; img.alt='proof'; img.src=dataUrl;
  row.querySelector('.bub').appendChild(img);
  $('thread').appendChild(row); $('thread').scrollTop=$('thread').scrollHeight;
  if(typeof recordMsg==='function') recordMsg(true, '📸 (sent proof)');
}
function shakeTask(i){ const el=$('taskList').querySelector('[data-task="'+i+'"]'); if(el){ el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake'); } }

/* ---- Accountability buddy — Goose watches you both, tattles each way ----
   Pairing is link-based (?buddy=<you>); no backend, so each phone watches its
   OWN user and alerts the buddy when that user ghosts. You pre-arm it when
   motivated — you never volunteer your own failure in the moment. Symmetric. */
function buddyInviteLink(){ return 'https://goose-lockin.vercel.app/?buddy='+encodeURIComponent(name||'a friend'); }
// Sent TO your buddy when YOU ghost (you pre-armed this — not self-incrimination).
function buddyAlert(task){
  const me=name||'Your buddy';
  return '🚨🪿 ACCOUNTABILITY ALERT: '+me+' just ghosted "'+task+'" on Goose. You\'re their buddy — permission to roast. (Goose made me send this.) '+buddyInviteLink();
}
// Invite a friend to pair up as mutual buddies.
function buddyInvite(){
  const me=name||'I';

}
/* opt-in auto-tattle: Goose alerts a saved buddy whenever you procrastinate.
   NOTE: a PWA can't silently send for you — this opens the pre-filled message;
   you tap send. Truly-silent delivery + a persistent friend opt-out need the
   Telegram-bot backend (next step). */
function getBuddy(){ try{ return JSON.parse(localStorage.getItem('goose-buddy')||'null'); }catch(e){ return null; } }
function setBuddy(b){ try{ b?localStorage.setItem('goose-buddy',JSON.stringify(b)):localStorage.removeItem('goose-buddy'); }catch(e){} }

function getFriends(){ try{ return JSON.parse(localStorage.getItem('goose-friends')||'{}'); }catch(e){ return {}; } }
function bumpFriend(nm){ if(!nm) return; var f=getFriends(); f[nm]=(f[nm]||0)+1; try{ localStorage.setItem('goose-friends',JSON.stringify(f)); }catch(e){} }
function friendsHTML(){
  var f=getFriends(); var rows=Object.keys(f).sort(function(a,b){return f[b]-f[a];});

function autoTattle(task){

  bumpFriend(b.name);
  gooseSay('Telling '+b.name+' you ghosted "'+task+'"… you signed up for this. 🪿');
  setTimeout(()=>window.open('https://wa.me/?text='+encodeURIComponent(buddyAlert(task)),'_blank'),600);

function markGhost(i){
  if(tasks[i].done) return;
  streak=0;
  const t=tasks[i].text; pushHistory('ghosted "'+t+'"');
  gooseSayAI('ghost', {task:t}, pick(NAG.ghost).replace('{t}',t));
  updateHud(); renderTasks();
  autoTattle(t); // opt-in: alert saved buddy when you procrastinate
}
function nagSomeone(){
  const pending=tasks.filter(t=>!t.done);
  if(!pending.length){ gooseSayAI('allDone', {}, pick(NAG.allDone)); return; }
  const t=pick(pending); nagLevel[t.text]=(nagLevel[t.text]||0)+1;
  const lv=Math.min(4,nagLevel[t.text]);
  pushHistory('nagged about "'+t.text+'" (level '+lv+')');
  gooseSayAI('nag', {task:t.text, nagLevel:lv}, pick(NAG['l'+lv]).replace('{t}',t.text));
}
function confetti(){
  for(let i=0;i<14;i++){const e=document.createElement('div');e.className='confetti';
    e.textContent=pick(['🪿','🔥','⭐','🎉']);e.style.left=(Math.random()*100)+'%';
    e.style.animationDelay=(Math.random()*.3)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),1500);}
}

/* ---- persistence: Goose remembers across app closes (localStorage, this device) ---- */
const STORE='goose-state-v1';
let thread=[];        // mirror of the chat ([{me,text}]) so the conversation survives a close
let phase='name';     // 'name' until Goose knows who you are, then 'tasks'
let calImported=false;
function recordMsg(me, text){ thread.push({me:!!me, text:text}); if(thread.length>60) thread=thread.slice(-60); saveState(); }
function saveState(){
  try{
    localStorage.setItem(STORE, JSON.stringify({name,tasks,xp,streak,nagLevel,history,thread:thread.slice(-60),phase,calImported}));
    localStorage.setItem('goose-tasks', JSON.stringify(tasks.map(t=>t.text)));  // keep screentime.html in sync
    localStorage.setItem('goose-name', name);
  }catch(e){}
}
function loadState(){
  try{ const s=JSON.parse(localStorage.getItem(STORE)||'null');
    if(s && typeof s==='object'){
      name=s.name||''; tasks=Array.isArray(s.tasks)?s.tasks:[]; xp=s.xp||0; streak=s.streak||0;
      nagLevel=s.nagLevel||{}; history=Array.isArray(s.history)?s.history:[];
      thread=Array.isArray(s.thread)?s.thread:[]; phase=s.phase||'name'; calImported=!!s.calImported;
      return true;
    }
  }catch(e){}
  return false;
}
function replayThread(){ $('thread').innerHTML=''; thread.forEach(m=>addBub(m.text, m.me, true)); }

/* ---- add a task (from the chat box OR the calendar) ---- */
function addTask(text, opts){
  opts=opts||{};
  text=String(text||'').trim(); if(!text) return false;
  if(tasks.some(t=>t.text.toLowerCase()===text.toLowerCase())) return false;  // dedupe
  tasks.push({text,done:false}); nagLevel[text]=1; pushHistory('set task "'+text+'"');
  renderTasks(); saveState();
  if(opts.nag) gooseSayAI('nag', {task:text, nagLevel:1}, pick(NAG.l1).replace('{t}',text));
  return true;
}

/* ---- calendar events become Goose's tasks ---- */
function importCalendar(items){
  let added=0;
  (items||[]).forEach(ev=>{
    let title=(ev.summary||'(busy)'), when='';
    try{ if(ev.start && ev.start.dateTime){ when=new Date(ev.start.dateTime).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})+' — '; } }catch(e){}
    let text=when+title;
    if(!tasks.some(t=>t.text===text)){ tasks.push({text,done:false}); nagLevel[text]=1; added++; }
  });
  calImported=true; renderTasks(); saveState();
  if(added){ pushHistory('imported '+added+' calendar event(s)');
    gooseSayAI('calendar', {count:added}, "Found "+added+" thing"+(added===1?'':'s')+" you scheduled. Let's see how many you actually do. 🪿");
  } else {
    gooseSayAI('calendarEmpty', {}, "Your calendar's empty today. Suspicious. What are you really up to? 🪿");
  }
}

/* ---- chat composer: first message = your name, then each line = a task ---- */
/* ---- mode toggle: Task (Goose holds you accountable) vs Chat (just talk) ---- */
let chatMode = (function(){ try{ return localStorage.getItem('goose-mode')==='chat' ? 'chat' : 'task'; }catch(e){ return 'task'; } })();
const CHAT_FALLBACK=["Mm-hm. Fascinating. Now go do something about it. 🪿","I'm listening. Also still watching. Both at once. 🪿","Noted. This isn't therapy — but go on. 🪿","Cute story. Want to make that a task, or are we just venting? 🪿"];
function paintMode(){
  var nodes=document.querySelectorAll('.modebtn');
  for(var k=0;k<nodes.length;k++){ var b=nodes[k], on=b.dataset.mode===chatMode;
    b.style.background = on ? 'var(--amber)' : 'transparent';
    b.style.color = on ? '#fff' : 'var(--muted)';
    b.style.boxShadow = on ? 'var(--shadow)' : 'none';
  }
  var ci=$('chatInput');
  if(ci && phase!=='name') ci.placeholder = (chatMode==='task') ? 'Add a task for Goose to hound you on…' : 'Just chatting with Goose…';
}
function setMode(m){ chatMode = (m==='chat') ? 'chat' : 'task'; try{ localStorage.setItem('goose-mode', chatMode); }catch(e){} paintMode(); }

$('composer').addEventListener('submit', e=>{
  e.preventDefault();
  const val=$('chatInput').value.trim(); if(!val) return;
  $('chatInput').value='';
  addBub(val, true);
  if(phase==='name'){
    name=parseName(val); phase='tasks'; saveState(); paintMode();
    gooseSay(name+". Noted. Connect your calendar so I can see what you're dodging — or stay in Task mode and tell me what to hound you on. 🪿");
  } else if(chatMode==='chat'){
    pushHistory('chatted: "'+val+'"');
    gooseSayAI('chat', {message:val}, pick(CHAT_FALLBACK));
  } else {
    if(!addTask(val, {nag:true})) gooseSayAI('dupe', {task:val}, "You already told me that one. I don't forget anymore. 🪿");

/* ---- Web Push: let Goose ping your phone WHILE you're off in another app ---- */
const VAPID_PUBLIC='BIGaKxtFiujN9YYaPIwPew-xsTKQdhA0aHslNgXwkXDSgh4rJ32kB7PL8YjS1JIW3DcOFctMzcysYEG4SjxkRiM'; // PUBLIC VAPID key — safe to commit (the PRIVATE key lives only in a Vercel env var)
const pushSupported='serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
let pushSub=null;
function urlB64ToUint8(s){const pad='='.repeat((4-s.length%4)%4);const b=(s+pad).replace(/-/g,'+').replace(/_/g,'/');const raw=atob(b);const out=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);return out;}
async function subscribePush(){const reg=await navigator.serviceWorker.ready;return await reg.pushManager.getSubscription()||await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)});}
async function enablePush(){
  if(!pushSupported||!VAPID_PUBLIC) return false;
  let perm=Notification.permission;
  if(perm==='default') perm=await Notification.requestPermission();
  if(perm!=='granted') return false;
  try{ pushSub=await subscribePush(); try{localStorage.setItem('goose-push','1');}catch(e){} return !!pushSub; }catch(e){ return false; }
}
// fired when you bail mid-task → server pushes you a few seconds later, while you're still in the other app
function sendAwayPush(){
  if(!pushSub) return;
  const t=(tasks.find(x=>!x.done)||{}).text||'';
  try{ fetch('/api/push',{method:'POST',keepalive:true,headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:pushSub,name,task:t})}); }catch(e){}
}
// silently re-acquire a subscription if you already granted permission in a past session
(async()=>{ if(pushSupported&&VAPID_PUBLIC&&Notification.permission==='granted'){ try{ pushSub=await subscribePush(); }catch(e){} } })();
// opt-in button
(function(){
  const pb=$('pushBtn'); if(!pb) return;
  const pbl=()=>pb.querySelector('.lbl')||pb;
  if(!pushSupported){ pb.style.display='none'; return; }
  if(Notification.permission==='granted') pbl().textContent='Alerts on';
  pb.addEventListener('click',async()=>{
    pbl().textContent='Asking…';
    const ok=await enablePush();
    pbl().textContent = ok ? 'Alerts on'
      : (isIOS && !standalone ? 'Install first' : 'Blocked');
  });
})();

/* ---- Focus watch: catch them bailing out of Goose mid-task ---- */
const AWAY_TROLL_MS=12000; // gone longer than this (ms) → goose calls you out on return. Low for demos; bump up for real use.
let hiddenAt=null;
function chatActive(){ return !$('s-chat').classList.contains('hide') && tasks.some(t=>!t.done); }
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    if(chatActive()){ hiddenAt=Date.now(); sendAwayPush(); } // start the clock + ping the phone while you're gone
    else hiddenAt=null;
  } else if(hiddenAt){
    const awayMs=Date.now()-hiddenAt; hiddenAt=null;       // Date.now() = true wall-clock, accurate even if the OS paused our JS
    if(awayMs>=AWAY_TROLL_MS && chatActive()){
      const sec=Math.round(awayMs/1000);
      const t=(tasks.find(x=>!x.done)||{}).text||'';
      pushHistory('left the app for '+sec+'s while "'+t+'" was unfinished');
      gooseSayAI('offtask', {task:t, awaySeconds:sec}, pick(NAG.offtask));
    }
  }
});

<!-- Google Calendar connect (client-side, PUBLIC Client ID; see config.js / CALENDAR_SETUP.md) -->
<script src="https://accounts.google.com/gsi/client" async></script>

<script>
  (function(){
    var btn=document.getElementById('calConnect'), st=document.getElementById('calStatus'), dc=document.getElementById('calDisconnect');
    if(!btn) return;
    function say(m){ st.textContent=m; }
    function setConnected(on){
      var lbl=btn.querySelector('.lbl');
      if(lbl) lbl.textContent = on ? 'Connected' : 'Calendar'; else btn.textContent = on ? 'Connected' : 'Calendar';
      if(dc) dc.style.display = on ? 'inline-block' : 'none';
    }
    btn.addEventListener('click',function(){
      if(!window.GooseCal){ say('Calendar connector still loading — try again in a sec.'); return; }
      if(!GooseCal.isConfigured()){ say('Calendar isn’t set up yet.'); return; }
      say('Opening Google… approve the “unverified app” screen (Advanced → Continue) to let Goose in. 🪿');
      GooseCal.connect().then(function(){
        say('✅ Connected. Reading your day…'); setConnected(true);
        return GooseCal.listToday();
      }).then(function(items){
        items=items||[];
        say('✅ Pulled '+items.length+' thing'+(items.length===1?'':'s')+' off your calendar. Nowhere to hide. 🪿');
        if(typeof importCalendar==='function') importCalendar(items);
      }).catch(function(e){ say('✗ '+((e&&e.message)||'Could not connect.')); });
    });
    if(dc) dc.addEventListener('click',function(){
      try{ if(window.GooseCal) GooseCal.disconnect(); }catch(e){}   // revokes the Google token
      try{ calImported=false; }catch(e){}
      try{ if(typeof saveState==='function') saveState(); }catch(e){}
      setConnected(false);
      say('🔌 Disconnected — Goose can’t see your calendar anymore. Your tasks stay put.');
      try{ if(typeof gooseSay==='function') gooseSay("Disconnected from your calendar. I'll pretend I didn't see all that. The tasks stay, though. 🪿"); }catch(e){}
    });
  })();
</script>
