<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Goose · Screen Time</title>
<meta name="theme-color" content="#F2A03D" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- Theme bootstrap — identical to app/index.html so dark mode carries over -->
<script>(function(){try{var t=localStorage.getItem('goose-theme');if(!t)t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  /* Palette + tokens copied verbatim from app/index.html so this page is on-brand */
  :root{
    --bg:#FBF7EF; --card:#FFFFFF; --ink:#2A2A28; --muted:#7A786F;
    --amber:#F2A03D; --amber-d:#C0721F; --coral:#E2603C; --green:#2FA86B; --disc:#FDEBCF;
    --bubble:#EFEADE; --shadow:0 8px 0 rgba(42,42,40,.10);
    --track:#ECE6D8;
  }
  html[data-theme="dark"]{
    --bg:#181613; --card:#23201B; --ink:#F4F0E7; --muted:#A8A296;
    --amber:#F4A84A; --amber-d:#F4A84A; --coral:#E8714E; --green:#46B97F; --disc:#2E2A22;
    --bubble:#2A2722; --shadow:0 8px 0 rgba(0,0,0,.30);
    --track:#322E26;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg); color:var(--ink); font-family:Nunito,system-ui,sans-serif}
  .app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;padding:18px 18px 28px}
  h1,h2,h3,.fun{font-family:"Baloo 2",system-ui,sans-serif}
  .theme-toggle{position:absolute;top:14px;right:14px;z-index:6;background:none;border:none;font-size:22px;line-height:1;padding:4px;cursor:pointer;color:var(--ink)}

  /* top bar */
  .topbar{display:flex;align-items:center;gap:8px;margin:2px 0 12px}
  .back-link{font-family:"Baloo 2";font-weight:700;font-size:15px;color:var(--amber-d);text-decoration:none;background:var(--card);
             padding:8px 12px;border-radius:14px;box-shadow:var(--shadow);display:inline-flex;align-items:center;gap:5px}
  .back-link:active{transform:translateY(2px)}
  .demo-tag{margin-left:auto;font-family:"Baloo 2";font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase;
            color:var(--muted);background:var(--bubble);padding:5px 9px;border-radius:999px}

  /* header / ring */
  .head{text-align:center;margin:2px 0 14px}
  .head .who{font-family:"Baloo 2";font-weight:800;font-size:15px;color:var(--amber-d);margin:0 0 2px}
  .ringwrap{position:relative;width:184px;height:184px;margin:6px auto 4px}
  .ringwrap svg{transform:rotate(-90deg)}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-goose{width:44px;margin-bottom:2px}
  .ring-total{font-family:"Baloo 2";font-weight:800;font-size:34px;line-height:1}
  .ring-label{font-weight:800;font-size:12px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

  /* goose roast bubble */
  .roast{display:flex;align-items:flex-start;gap:10px;background:var(--card);border-radius:22px;padding:14px;box-shadow:var(--shadow);margin:6px 0 16px}
  .roast .av{width:40px;height:40px;flex:none;border-radius:50%;background:var(--disc);display:flex;align-items:center;justify-content:center;font-size:22px}
  .roast .body{flex:1}
  .roast .verdict{font-family:"Baloo 2";font-weight:800;font-size:13px;color:var(--coral);text-transform:uppercase;letter-spacing:.04em;margin:0 0 4px}
  .roast .line{font-weight:700;font-size:15.5px;line-height:1.38;margin:0 0 8px}
  .roast .instead{font-weight:700;font-size:14px;line-height:1.38;color:var(--ink);background:var(--bubble);border-radius:14px;padding:9px 11px}
  .roast .instead b{color:var(--green)}

  /* app list */
  .listhead{display:flex;align-items:baseline;justify-content:space-between;margin:2px 4px 8px}
  .listhead h2{font-size:17px;margin:0}
  .listhead .sub{font-weight:800;font-size:12px;color:var(--muted)}
  .apps{display:flex;flex-direction:column;gap:9px}
  .appcard{background:var(--card);border-radius:16px;padding:11px 13px;box-shadow:var(--shadow)}
  .appcard.worst{outline:2.5px solid var(--coral);outline-offset:-2.5px}
  .approw{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .appicon{width:34px;height:34px;flex:none;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
  .appname{font-family:"Baloo 2";font-weight:700;font-size:15px;flex:1;display:flex;align-items:center;gap:6px}
  .worsttag{font-family:"Baloo 2";font-weight:800;font-size:9.5px;color:#fff;background:var(--coral);padding:2px 6px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
  .apptime{font-family:"Baloo 2";font-weight:800;font-size:15px;color:var(--ink)}
  .bartrack{height:10px;background:var(--track);border-radius:6px;overflow:hidden}
  .barfill{height:100%;width:0;border-radius:6px;transition:width .6s cubic-bezier(.2,.7,.2,1)}

  /* controls */
  .controls{margin-top:18px}
  .btn{font-family:"Baloo 2";font-weight:700;font-size:18px;border:none;border-radius:18px;padding:15px 18px;
       background:var(--amber);color:#fff;box-shadow:var(--shadow);cursor:pointer;width:100%;transition:transform .06s}
  .btn:active{transform:translateY(4px);box-shadow:0 4px 0 rgba(42,42,40,.10)}
  .btn.coral{background:var(--coral)}
  .foot{text-align:center;font-weight:700;font-size:11.5px;color:var(--muted);margin-top:14px;line-height:1.5}

  @keyframes pop{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
  .pop{animation:pop .28s ease}
</style>
</head>
<body>
<div class="app">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>

  <div class="topbar">
    <a class="back-link" href="/app">← Goose</a>
    <!-- Honest label: these numbers are simulated, not real OS Screen Time -->
    <span class="demo-tag" title="Numbers are simulated for the demo">🪿 demo data</span>
  </div>

  <div class="head">
    <p class="who" id="who">Today's screen time, judged by a goose</p>
    <div class="ringwrap">
      <svg width="184" height="184" viewBox="0 0 184 184">
        <circle cx="92" cy="92" r="80" fill="none" stroke="var(--track)" stroke-width="14"/>
        <circle id="ringFill" cx="92" cy="92" r="80" fill="none" stroke="var(--coral)" stroke-width="14"
                stroke-linecap="round" stroke-dasharray="502.4" stroke-dashoffset="502.4"/>
      </svg>
      <div class="ring-center">
        <svg class="ring-goose" viewBox="0 0 220 190" aria-hidden="true"><circle cx="110" cy="98" r="80" fill="var(--disc)"/><path d="M40 96 C55 72 78 64 100 66 C120 50 138 40 152 40 Q175 40 196 52 Q180 58 166 60 C168 78 150 92 140 104 C134 120 120 140 96 148 C70 154 50 140 44 120 C42 110 40 102 40 96 Z" fill="#fff" stroke="#57564F" stroke-width="2.5" stroke-linejoin="round"/><path d="M88 92 C104 100 116 116 106 132" fill="none" stroke="#57564F" stroke-width="2" stroke-linecap="round"/><path d="M182 46 L201 52 L182 59 Z" fill="#F2A03D" stroke="#C0721F" stroke-width="1"/><circle cx="158" cy="50" r="3.6" fill="#2A2A28"/><path d="M149 41 L163 44" stroke="#2A2A28" stroke-width="2" stroke-linecap="round"/></svg>
        <div class="ring-total" id="ringTotal">0h 0m</div>
        <div class="ring-label">on your phone today</div>
      </div>
    </div>
  </div>

  <div class="roast pop" id="roast">
    <div class="av">🪿</div>
    <div class="body">
      <p class="verdict" id="verdict">The verdict</p>
      <p class="line" id="roastLine">Loading the bad news…</p>
      <div class="instead" id="insteadLine"></div>
    </div>
  </div>

  <div class="listhead">
    <h2>Where it went</h2>
    <span class="sub" id="pickups"></span>
  </div>
  <div class="apps" id="apps"></div>

  <div class="controls">
    <button class="btn coral" id="reroll">🔄 New day, fresh shame</button>
  </div>
  <p class="foot">Screen Time data is simulated for the demo. Goose can't read your OS… <i>yet.</i> 🪿</p>
</div>

<script src="screentime.js"></script>
</body>
</html>
